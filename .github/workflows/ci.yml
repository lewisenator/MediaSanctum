name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew :Backend:check
        env:
          HARDCOVER_API_KEY: ${{ secrets.HARDCOVER_API_KEY }}
          CONFIG: /tmp/media-sanctum-config
          DATA: /tmp/media-sanctum-data

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: Backend/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Coverage summary
        if: always()
        run: |
          REPORT=Backend/build/reports/jacoco/test/jacocoTestReport.xml
          [ -f "$REPORT" ] || exit 0
          python3 - "$REPORT" <<'EOF'
          import sys, os, xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          counters = {}
          for c in root.findall('counter'):
              missed, covered = int(c.get('missed', 0)), int(c.get('covered', 0))
              total = missed + covered
              counters[c.get('type')] = (covered, total, covered / total * 100 if total else 0)
          rows = []
          for metric in ['INSTRUCTION', 'BRANCH', 'LINE', 'METHOD', 'CLASS']:
              if metric not in counters: continue
              covered, total, pct = counters[metric]
              icon = '✅' if pct >= 80 else '⚠️' if pct >= 60 else '❌'
              rows.append(f'| {metric.title()} | {icon} {pct:.1f}% | {covered:,} / {total:,} |')
          summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(summary, 'a') as f:
              f.write('## JaCoCo Coverage\n\n')
              f.write('| Metric | Coverage | Covered / Total |\n')
              f.write('|--------|----------|-----------------|\n')
              f.write('\n'.join(rows) + '\n')
          EOF

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Type check
        working-directory: Frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: Frontend
        run: npm test

  dependency-submission:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
