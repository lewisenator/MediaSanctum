name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew :Backend:check
        env:
          HARDCOVER_API_KEY: ${{ secrets.HARDCOVER_API_KEY }}
          CONFIG: /tmp/media-sanctum-config
          DATA: /tmp/media-sanctum-data

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Type check
        working-directory: Frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: Frontend
        run: npm test

  dependency-submission:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
