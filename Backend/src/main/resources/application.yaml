spring:
  application:
    name: backend
  thread:
    virtual:
      enabled: true
  flyway:
      locations: classpath:db/migration
      baseline-on-migrate: false
server:
  port: 8000
management:
  endpoints:
    web:
      base-path: /api/actuator
media-sanctum:
  config-dir: ${CONFIG}
  data-dir: ${DATA}
  cookies-secure: true
  log:
    path: ${CONFIG}/logs/media-sanctum.jsonl
  db:
    pool-size: 5
    connection-timeout-ms: 30_000
    busy-timeout-ms: 30_000